<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="url(#grad1)" />
  
  <!-- Connections -->
  <g stroke="#4facef" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <path d="M500 400 L500 150" />
    <path d="M500 400 L800 250" />
    <path d="M500 400 L800 550" />
    <path d="M500 400 L500 650" />
    <path d="M500 400 L200 550" />
    <path d="M500 400 L200 250" />
    <path d="M500 400 L700 100" />
    <path d="M500 400 L300 100" />
  </g>

  <!-- Central Hub -->
  <circle cx="500" cy="400" r="70" fill="#161b22" stroke="#4facef" stroke-width="4" filter="url(#glow)" />
  <text x="500" y="395" font-family="Segoe UI, Arial" font-size="16" fill="#4facef" text-anchor="middle" font-weight="bold">ANTIGRAVITY</text>
  <text x="500" y="420" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.8">COO / MASTER</text>

  <!-- Poles -->
  <!-- Business -->
  <g transform="translate(430, 90)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#2ecc71" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">BUSINESS</text>
  </g>

  <!-- Medical -->
  <g transform="translate(730, 220)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#e74c3c" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">MEDICAL</text>
  </g>

  <!-- Tech -->
  <g transform="translate(730, 520)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#3498db" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">TECH</text>
  </g>

  <!-- Creative -->
  <g transform="translate(430, 620)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#f1c40f" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">CREATIVE</text>
  </g>

  <!-- Intelligence -->
  <g transform="translate(130, 520)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#9b59b6" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">INTELLIGENCE</text>
  </g>

  <!-- RD -->
  <g transform="translate(130, 220)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#1abc9c" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">R&amp;D</text>
  </g>

  <!-- Finance -->
  <g transform="translate(630, 70)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#f39c12" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">FINANCE</text>
  </g>

  <!-- Juridique -->
  <g transform="translate(230, 70)">
    <rect width="140" height="60" rx="15" fill="#1c2128" stroke="#95a5a6" stroke-width="2" />
    <text x="70" y="35" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">JURIDIQUE</text>
  </g>

  <!-- Labels -->
  <text x="500" y="50" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="2">DIGITAL FLUX MULTINATIONAL</text>
  <text x="500" y="770" font-family="Segoe UI, Arial" font-size="12" fill="#4facef" text-anchor="middle" opacity="0.6">Souveraineté Digitale V27.2 - Powered by Antigravity</text>

</svg>

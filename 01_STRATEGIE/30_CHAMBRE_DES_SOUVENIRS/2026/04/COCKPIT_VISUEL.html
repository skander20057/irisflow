<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Cockpit | Digital Flux</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facef;
            --secondary: #2ecc71;
            --bg: #0d1117;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1e2e 0%, #0d1117 100%);
        }

        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .container {
            padding: 50px;
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            margin-bottom: 30px;
            border-left: 4px solid var(--primary);
            padding-left: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(79, 172, 239, 0.2);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--primary);
        }

        .card p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: var(--bg);
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .status {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            background: var(--secondary);
            color: white;
            padding: 4px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">Digital Flux | Antigravity</div>
        <div style="font-size: 14px; opacity: 0.6;">V28.1 - SOUVERAINETÉ VISUELLE ACTIVÉE</div>
    </div>

    <div class="container">
        <h1>COCKPIT VISUEL CEO</h1>
        
        <div class="grid">
            <!-- Asset 1 -->
            <div class="card">
                <span class="status">Souverain (SVG)</span>
                <img src="../VISUELS/ORGANIGRAMME_MULTINATIONAL_V27.svg" alt="Organigramme">
                <h3>Organigramme Multinational</h3>
                <p>Structure à 8 PÔLES de l'agence Digital Flux. Orchestration suprême.</p>
                <a href="../VISUELS/ORGANIGRAMME_MULTINATIONAL_V27.svg" class="btn" target="_blank">OUVRIR SOURCE</a>
            </div>

            <!-- Placeholder for future designs -->
            <div class="card" style="opacity: 0.5; border-style: dashed;">
                <h3>Prochain Rendu...</h3>
                <p>En attente d'initiation de mission au Pôle Créatif.</p>
            </div>
        </div>
    </div>
</body>
</html>

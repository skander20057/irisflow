<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IRIS OS TITAN — V80.0 Sovereign Routing</title>
    
    <!-- PWA & Mobile Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#22d3ee">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #22d3ee; --emerald: #10b981; --rose: #f43f5e; --slate-900: #0f172a; --slate-950: #020617; }
        body { background-color: var(--slate-950); color: #f1f5f9; font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .bento { background: rgba(30, 41, 59, 0.4); border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(12px); transform: translateZ(0); }
        .bento:hover { border-color: rgba(34, 211, 238, 0.4); box-shadow: 0 25px 50px -12px rgba(34, 211, 238, 0.2); transform: translateY(-4px) scale(1.02); }
        .nav-btn { width: 100%; padding: 1rem 1.5rem; border-radius: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; text-align: left; display: flex; align-items: center; gap: 1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.75rem; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-btn.active { background: rgba(34, 211, 238, 0.1); color: var(--cyan); border-color: rgba(34, 211, 238, 0.2); box-shadow: 0 0 20px rgba(34, 211, 238, 0.05); }
        .magic-counter { display: flex; align-items: baseline; gap: 2px; }
        .digit-container { height: 48px; overflow: hidden; position: relative; width: 0.65em; }
        .digit-strip { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .digit { height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 2.25rem; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 100px; }
        #vortex-canvas { position: fixed; inset: 0; opacity: 0.3; pointer-events: none; z-index: 0; }
        
        /* Animations & Transitions */
        .view-content { display: none; height: 100%; flex-direction: column; animation: fadeInSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .view-content.active { display: flex; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: skeleton-pulse 1.5s infinite linear; border-radius: 1rem; }
        @keyframes skeleton-pulse { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        #inspector { box-shadow: -20px 0 60px rgba(0,0,0,0.5); border-left: 1px solid rgba(255,255,255,0.05); }
        .transition-soft { transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Planning Scroll Logic (V93.0) */
        .calendar-sticky-header { position: sticky; top: -1px; background: var(--slate-950); z-index: 40; padding-top: 1rem; margin-top: -1rem; }
        .calendar-scroll-body { scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch; }
        .calendar-scroll-body::-webkit-scrollbar { display: none; }
        
        @media (max-width: 768px) {
            .calendar-scroll-body { max-height: 62vh; overflow-y: auto; padding-bottom: 5rem; }
        }
        
        /* Calendar Styles */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; overflow: hidden; }
        .calendar-day { min-height: 120px; background: rgba(15, 23, 42, 0.2); padding: 1rem; transition: background 0.3s; }
        .calendar-day.today { background: rgba(34, 211, 238, 0.05); }
        .calendar-day:hover { background: rgba(255,255,255,0.02); }
        .calendar-header-day { padding: 1rem; text-align: center; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; color: #64748b; background: rgba(15, 23, 42, 0.4); }
        .event-chip { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.2); color: var(--cyan); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .calendar-day { min-height: 80px; padding: 0.5rem; }
            .calendar-header-day { padding: 0.5rem; font-size: 0.5rem; }
            .bento { padding: 1.25rem; border-radius: 1.5rem; }
            #page-title { font-size: 1.5rem; }
            #page-status { font-size: 8px; }
            header { height: 100px; padding-left: 2rem; padding-right: 2rem; }
            section { padding: 1rem; }
            .event-chip { font-size: 7px; padding: 2px 4px; }
        }

        /* Toast Styles */
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 1rem; pointer-events: none; }
        .toast { pointer-events: auto; padding: 1.5rem; border-radius: 1.5rem; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: toast-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; min-width: 300px; display: flex; align-items: center; gap: 1rem; }
        @keyframes toast-in { from { transform: translateX(100%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
        .toast.out { animation: toast-out 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes toast-out { to { transform: translateX(100%) scale(0.9); opacity: 0; } }
        .toast-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
        .toast-success .toast-icon { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>
    <canvas id="vortex-canvas"></canvas>
    <div id="toast-container"></div>

    <div id="menu-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden" onclick="toggleSidebar()"></div>

    <div id="app" class="flex h-screen w-full relative z-10 flex-col md:flex-row pb-20 md:pb-0">
        <!-- SIDEBAR (Desktop & Mobile Slide-over) -->
        <aside id="sidebar-panel" class="fixed inset-y-0 left-0 w-80 glass flex-col p-8 gap-10 -translate-x-full md:translate-x-0 md:static transition-transform duration-500 z-50 flex">
            <div class="flex items-center gap-4 px-2">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30 font-black">⚜️</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter">IRIS <span class="text-cyan-400">OS</span></h1>
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em]">SOVEREIGN V80.0</span>
                </div>
            </div>

            <nav class="flex-1 flex flex-col gap-2">
                <button onclick="navigate('missions')" id="nav-missions" class="nav-btn">🛰️ Missions</button>
                <button onclick="navigate('crm')" id="nav-crm" class="nav-btn">📑 CRM Élite</button>
                <button onclick="navigate('calendrier')" id="nav-calendrier" class="nav-btn">🗓️ Calendrier</button>
                <button onclick="navigate('projets')" id="nav-projets" class="nav-btn">🏗️ Projets</button>
                <button onclick="navigate('agents')" id="nav-agents" class="nav-btn">🤖 Agents</button>
                <button onclick="navigate('analytics')" id="nav-analytics" class="nav-btn">📈 Analytique</button>
            </nav>

            <div class="p-4 rounded-2xl bg-neutral-900 border border-white/5">
                <div class="text-[10px] font-black text-slate-500 uppercase mb-2">Sync Engine</div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
                    <div class="text-xs font-bold text-cyan-400 uppercase tracking-widest" id="sync-engine-status">Active Synapse</div>
                </div>
            </div>
        </aside>

        <!-- BOTTOM NAV (Mobile) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 h-20 glass border-t border-white/10 z-50 flex items-center justify-around px-4 pb-2">
            <button onclick="navigate('missions')" id="m-nav-missions" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">🛰️</span>
                <span class="text-[8px] font-black uppercase tracking-widest">Missions</span>
            </button>
            <button onclick="navigate('crm')" id="m-nav-crm" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">📑</span>
                <span class="text-[8px] font-black uppercase tracking-widest">CRM</span>
            </button>
            <button onclick="navigate('calendrier')" id="m-nav-calendrier" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl text-cyan-400">🗓️</span>
                <span class="text-[8px] font-black uppercase tracking-widest text-cyan-400">Plann</span>
            </button>
            <button onclick="navigate('projets')" id="m-nav-projets" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">🏗️</span>
                <span class="text-[8px] font-black uppercase tracking-widest">Projets</span>
            </button>
            <button onclick="navigate('agents')" id="m-nav-agents" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">🤖</span>
                <span class="text-[8px] font-black uppercase tracking-widest">Agents</span>
            </button>
            <button onclick="navigate('analytics')" id="m-nav-analytics" class="flex flex-col items-center gap-1 text-slate-500">
                <span class="text-xl">📈</span>
                <span class="text-[8px] font-black uppercase tracking-widest">Analytique</span>
            </button>
        </nav>

        <!-- CONTENT -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- DYNAMIC HEADER -->
            <header class="h-20 md:h-28 px-6 md:px-12 flex items-center justify-between glass border-b border-white/5 bg-slate-950/40">
                <div id="header-left" class="flex items-center gap-6">
                    <!-- Burger Icon (Mobile) -->
                    <button onclick="toggleSidebar()" class="md:hidden p-3 bg-white/5 rounded-xl text-cyan-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div>
                        <h2 class="text-xl md:text-4xl font-black tracking-tighter uppercase" id="page-title">Analyse des Performances</h2>
                        <div class="text-[8px] md:text-[10px] font-black text-slate-500 tracking-[0.4em] mt-1 uppercase" id="page-status">Statut de l'Agence</div>
                    </div>
                </div>
                <div id="header-right" class="flex items-center gap-4">
                    <!-- Signal Satellite & Neural Heartbeat (V87.0) -->
                    <div id="health-signal" class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded-full border border-white/10 transition-all">
                        <div id="neural-pulse-dot" class="w-1.5 h-1.5 rounded-full bg-slate-500 transition-all duration-300"></div>
                        <span id="signal-text" class="text-[8px] font-black uppercase text-slate-500 tracking-widest">Neural Pulse</span>
                    </div>

                    <button onclick="syncAll()" class="p-3 bg-white/5 rounded-xl text-emerald-400 hover:bg-emerald-500/10 transition-all border border-emerald-500/10">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </header>

            <!-- VIEW CONTAINER -->
            <section class="flex-1 p-4 md:p-12 overflow-y-auto custom-scroll relative h-full">
                <div id="view-missions" class="view-content"><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto custom-scroll pr-4" id="mission-cards"></div></div>
                <div id="view-crm" class="view-content"><div class="flex-1 glass rounded-[2.5rem] overflow-hidden flex flex-col" id="crm-container"></div></div>
                <div id="view-calendrier" class="view-content"><div class="flex-1 glass rounded-[2.5rem] overflow-hidden flex flex-col p-8" id="calendrier-container"></div></div>
                <div id="view-projets" class="view-content"><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 overflow-y-auto custom-scroll pr-4" id="project-gallery"></div></div>
                <div id="view-agents" class="view-content"><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 overflow-y-auto custom-scroll pr-4" id="agent-list"></div></div>
                <div id="view-analytics" class="view-content"><div class="flex-1 flex flex-col gap-8 pb-32" id="analytics-container"></div></div>
            </section>
        </main>
    </div>

    <!-- FICHE DÉTAIL / INSPECTOR -->
    <div id="inspector" class="fixed inset-y-0 right-0 w-full md:w-[600px] glass translate-x-full transition-transform duration-700 z-50 p-6 md:p-12 flex flex-col shadow-2xl">
        <div class="flex justify-between items-start mb-8">
            <div><span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest block mb-2">Neural Inspector</span><h2 class="text-3xl md:text-5xl font-black tracking-tighter" id="ins-title">TITAN</h2></div>
            <button onclick="closeInspector()" class="p-3 bg-white/5 rounded-2xl hover:bg-white/10 transition-all font-black text-2xl">×</button>
        </div>
        <div class="flex-1 bg-black/40 rounded-[2rem] border border-white/5 p-6 md:p-10 overflow-y-auto custom-scroll" id="ins-content"></div>
    </div>

    <!-- TERMINAL LIVE LOGS (V83.0) -->
    <div id="terminal-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 md:p-20 hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeLiveTerminal()"></div>
        <div class="relative w-full max-w-4xl h-[70vh] bg-black border border-white/10 rounded-[2rem] flex flex-col shadow-2xl overflow-hidden animate-zoomIn">
            <div class="flex justify-between items-center p-6 border-b border-white/5 bg-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                    <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                    <span class="ml-4 font-mono text-[10px] text-emerald-400 font-black uppercase tracking-widest">Live Execution Console : <span id="terminal-agent-name">...</span></span>
                </div>
                <button onclick="closeLiveTerminal()" class="text-slate-500 hover:text-white transition-all text-xl font-black p-2">×</button>
            </div>
            <div id="terminal-content" class="flex-1 p-8 font-mono text-xs md:text-sm text-emerald-500/80 overflow-y-auto custom-scroll space-y-2 bg-[#050505] selection:bg-emerald-500/20">
                <!-- Les logs s'injectent ici -->
                <div class="animate-pulse">_</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 🚨 PROTOCOLE DE SÉCURITÉ IRIS OS — MISSION CRITICAL
         * --------------------------------------------------
         * RÉGLE D'OR : Le Routage (fct navigate) et le Root Layout DOIVENT rester intacts.
         * PRIORITÉ ABSOLUE : L'affichage des modules CRM, Planning et Agents doit être garanti.
         * ISOLATION : Toute erreur locale d'un module doit être confinée par safeRender().
         * VÉRIFICATION : Avant validation, confirmer que le clic menu déclenche le rendu.
         */

        const state = { 
            currentRoute: 'missions', 
            missions: [], 
            crm: [], 
            projets: [], 
            agents: { children: [] },
            appointments: [],
            expandedPoles: {},
            isMenuOpen: false,
            viewDate: new Date(),
            crmFilters: { zone: 'Tous', status: 'Tous' },
            showCRMStats: false,
            calendarMode: 'day',
            telemetry: { status: {}, sync: { business: 'inactive' }, logs: "", lastPulse: 0 },
            isTerminalOpen: false,
            analyticsPeriod: 'month',
            analyticsChart: null,
            ui_clock: 0
        };
        const renderCache = { missions: null, crm: null, calendrier: null, projets: null, agents: null, analytics: null };

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'success' ? '⚡' : '⚠️';
            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div>
                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-500">${title}</div>
                    <div class="text-sm font-bold text-white">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('out');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        async function init() {
            try {
                console.log("🚀 [BOOT] Initialisation Noyau TITAN...");
                showInitialSkeletons();
                
                // BOOT INSTANTANÉ (Navigation prioritaire sur les données)
                navigate('missions'); 
                
                // CHARGEMENT ASYNCHRONE DES FLUX
                syncAll().then(() => {
                    console.log("✅ [BOOT] Flux Synchronisés.");
                });
                
                // --- PWA ACTIVATION (V92.1 Android Shield Fix) ---
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        const cacheBuster = Date.now();
                        navigator.serviceWorker.register(`./sw.js?v=${cacheBuster}`)
                            .then(reg => console.log('📡 [PWA] Service Worker Certifié'))
                            .catch(err => console.error('⚠️ [PWA] Échec liaison SW :', err));
                    });
                }

                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    window.deferredPrompt = e;
                    showToast('PWA Ready', 'IRIS OS est prêt pour l’installation mobile.', 'success');
                });
                
                // --- NEURAL HEARTBEAT ---
                setInterval(syncAll, 20000); 
                setInterval(syncTelemetry, 1500); 
                setInterval(checkHealth, 30000); 
            } catch (e) {
                console.error("❌ [CRITICAL] Échec Boot Noyau :", e);
            }
        }

        async function syncTelemetry() {
            try {
                // BYPASS CACHE TOTAL (V90.0 Signal Vivant)
                const t = Date.now();
                const res = await fetch(`/api/v1/telemetry/sync?t=${t}`, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
                    cache: 'no-store'
                });
                if (res.ok) {
                    const data = await res.json();
                    state.telemetry.sync = data;
                    state.telemetry.lastPulse = data.timestamp;
                    state.ui_clock++; // Boucle de vie (V90.0)
                    
                    // MISE À JOUR JOINTE : HEADER + AGENTS + LOGS
                    updateGlobalPulse();
                    renderAgents(true); 
                    if (state.isTerminalOpen) updateLogs(); 
                }
            } catch (e) { console.warn("⚪ [TÉLÉMÉTRIE] Signal Vivant Indisponible."); }
        }

        function updateGlobalPulse() {
            const dot = document.getElementById('neural-pulse-dot');
            const text = document.getElementById('signal-text');
            if (!dot || !text) return;

            // CASCADE EN DUR (V89.0) : Le signal Sync Witness est maître
            const isSyncActive = state.telemetry.sync.business === 'active';
            
            if (isSyncActive) {
                dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_12px_rgba(52,211,153,1)]";
                text.className = "text-[8px] font-black uppercase text-emerald-400 tracking-widest";
                text.innerText = "ACTIVE LINK";
            } else {
                dot.className = "w-1.5 h-1.5 rounded-full bg-slate-500";
                text.className = "text-[8px] font-black uppercase text-slate-500 tracking-widest transition-colors";
                text.innerText = "Neural Pulse";
            }
        }

        function showInitialSkeletons() {
            const skeletons = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                    ${Array(8).fill('<div class="bento h-64 skeleton"></div>').join('')}
                </div>
            `;
            const agents = document.getElementById('agent-list');
            const missions = document.getElementById('mission-cards');
            const crm = document.getElementById('crm-container');
            
            if(agents) agents.innerHTML = skeletons;
            if(missions) missions.innerHTML = skeletons;
            if(crm) crm.innerHTML = `<div class="p-12 space-y-8">${Array(5).fill('<div class="h-16 skeleton"></div>').join('')}</div>`;
        }

        async function syncAll() {
            const statusIndicator = document.getElementById('sync-engine-status');
            if(statusIndicator) {
                statusIndicator.innerText = "Sync en cours...";
                statusIndicator.classList.add('animate-pulse');
            }

            try {
                const results = await Promise.allSettled([
                    fetch('/api/v1/missions').then(r => r.ok ? r.json() : Promise.reject('Missions Error')),
                    fetch('/api/v1/prospects').then(r => r.ok ? r.json() : Promise.reject('Prospects Error')),
                    fetch('/api/v1/projets').then(r => r.ok ? r.json() : Promise.reject('Projets Error')),
                    fetch('/api/v1/agents').then(r => r.ok ? r.json() : Promise.reject('Agents Error')),
                    fetch('/api/v1/appointments').then(r => r.ok ? r.json() : Promise.reject('Appts Error')),
                    fetch('/api/v1/analytics/history').then(r => r.ok ? r.json() : Promise.reject('History Error'))
                ]);

                const errors = results.filter(r => r.status === 'rejected');
                if (errors.length > 0) {
                    console.error("⚠️ Certains flux sont corrompus :", errors);
                    showToast("Flux Perturbé", `${errors.length} modules n'ont pas répondu.`, 'warning');
                }

                if (results[0].status === 'fulfilled') state.missions = results[0].value;
                if (results[1].status === 'fulfilled') state.crm = results[1].value;
                if (results[2].status === 'fulfilled') state.projets = results[2].value;
                if (results[3].status === 'fulfilled') {
                    state.agents = results[3].value;
                    // Forcer l'ouverture du premier pôle si aucun n'est ouvert
                    if (Object.keys(state.expandedPoles).length === 0 && state.agents.children.length > 0) {
                        state.expandedPoles[state.agents.children[0].name] = true;
                    }
                }
                if (results[4].status === 'fulfilled') state.appointments = results[4].value;
                if (results[5].status === 'fulfilled') state.history = results[5].value;

                // --- TÉLÉMÉTRIE (SYNC PARALLÈLE AVEC BYPASS CACHE QUANTIQUE) ---
                const v = Date.now();
                const statusRes = await fetch(`/api/v1/telemetry/status?v=${v}`, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
                    cache: 'no-store'
                }).catch(() => null);
                if (statusRes && statusRes.ok) state.telemetry.status = await statusRes.json();

                // Reset Cache pour forcer le rendu des nouvelles données
                Object.keys(renderCache).forEach(k => renderCache[k] = false);

                // Rendu global (Bypass cache pour les LEDs)
                // Rendu global Isolé (V94.0 Lockdown)
                safeRender(renderMissions, 'Missions');
                safeRender(renderCRM, 'CRM');
                safeRender(renderCalendrier, 'Planning');
                safeRender(renderProjets, 'Projets');
                safeRender(renderAgents, 'Agents');

                if(statusIndicator) {
                    statusIndicator.innerText = "Synchronisé";
                    statusIndicator.classList.remove('animate-pulse');
                }

            } catch (e) { 
                console.error("❌ Erreur de synchronisation :", e);
                showToast("Échec Sync", "Vérifiez votre connexion au tunnel.", 'error');
            }
        }

        // --- MOTEUR DE RENDU SÉCURISÉ (V94.0 ANTI-CRASH) ---
        function safeRender(renderFunc, moduleName) {
            try {
                renderFunc();
            } catch (e) {
                console.error(`❌ Crash Module [${moduleName}] :`, e);
                const containerId = moduleName.toLowerCase() === 'planning' ? 'calendrier-container' : `${moduleName.toLowerCase()}-container`;
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = `
                        <div class="bento flex flex-col items-center justify-center py-20 opacity-60">
                            <div class="text-4xl mb-4">⚠️</div>
                            <div class="text-sm font-black uppercase tracking-widest text-rose-400">Crash : ${moduleName}</div>
                            <div class="text-[10px] text-slate-500 mt-2">Le module est temporairement isolé.</div>
                        </div>
                    `;
                }
            }
        }

                    dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]";

            } catch (e) {
                dot.className = "w-1.5 h-1.5 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)]";
                txt.innerText = "Flux Offline";
                txt.className = "text-[8px] font-black uppercase text-rose-500";

        }

        async function syncCRM() {
            const btn = document.querySelector('#header-right button');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = `⌛ Syncing...`;
            await fetch('/api/v1/sync', { method: 'POST' });

            renderContent('crm');

        function renderContent(route) {
            // Lazy Rendering with Cache (V94.0 Isolated)
            if (renderCache[route]) return;
            
            switch(route) {
                case 'missions': safeRender(renderMissions, 'Missions'); break;
                case 'crm': safeRender(renderCRM, 'CRM'); break;
                case 'calendrier': safeRender(renderCalendrier, 'Planning'); break;
                case 'projets': safeRender(renderProjets, 'Projets'); break;
                case 'agents': safeRender(renderAgents, 'Agents'); break;
                case 'analytics': safeRender(renderAnalytics, 'Analytics'); break;
            }
        }
        
        function setAnalyticsPeriod(period) {
            state.analyticsPeriod = period;
            renderCache.analytics = null;
            renderAnalytics();
        }

        function renderAnalytics() {
            const container = document.getElementById('analytics-container');
            if(!container) return;

            // --- 1. CONFIGURATION TEMPORELLE V110.0 (Sovereign Bridge) ---
            const now = new Date();
            const history = state.history || [];
            const crm = state.crm || [];
            
            let currentStart, currentEnd;
            let stepSize = state.analyticsPeriod === 'day' ? "hour" : "day";

            const isNightOwl = now.getHours() < 4;
            let targetDate = new Date(now.getTime());
            if (isNightOwl) targetDate.setDate(targetDate.getDate() - 1);
            const dateISO = targetDate.toISOString().split('T')[0];

            if (state.analyticsPeriod === 'day') {
                currentStart = new Date(targetDate.getTime()); currentStart.setHours(0,0,0,0);
                currentEnd = new Date(targetDate.getTime()); currentEnd.setHours(23,59,59,999);
            } else if (state.analyticsPeriod === 'week') {
                const day = now.getDay(), diff = now.getDate() - day + (day == 0 ? -6:1);
                currentStart = new Date(now.getTime()); currentStart.setDate(diff); currentStart.setHours(0,0,0,0);
                currentEnd = new Date(currentStart.getTime()); currentEnd.setDate(currentEnd.getDate() + 6); currentEnd.setHours(23,59,59,999);
            } else if (state.analyticsPeriod === 'month') {
                currentStart = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0);
                currentEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
            } else {
                currentStart = new Date(now.getFullYear(), 0, 1, 0, 0, 0, 0);
                currentEnd = new Date(now.getFullYear(), 11, 31, 23, 59, 59, 999);
                stepSize = "month";
            }

            // --- 2. CALCULATEURS D'URGENCE V110.0 (Bypass de Force) ---
            const activeProspects = crm.filter(p => {
                const s = (p.funnel || p.status || p.statut || "").toLowerCase();
                return s !== "" && !s.includes('nouveau') && !s.includes('sourcé');
            });

            const globalAppels = activeProspects.length;
            const globalRDV = activeProspects.filter(p => {
                const s = (p.funnel || p.status || p.statut || "").toLowerCase();
                return s.includes('rdv') || s.includes('fixé');
            }).length;

            // --- 3. PONT DE DONNÉES CRM -> ANALYTICS (V113.0 Sovereign Sync) ---
            // On génère des interactions basées UNIQUEMENT sur l'état réel du CRM
            const processedNames = new Set();
            const crmInteractions = [];

            crm.forEach((p, idx) => {
                const s = (p.funnel || p.status || p.statut || "").toLowerCase();
                const name = p.name || "";
                
                // Filtre Strict : Uniquement les prospects modifiés (pas Nouveau/Sourcé)
                if (s === "" || s.includes('nouveau') || s.includes('sourcé')) return;
                
                // Dé-duplication stricte par nom normalisé
                const normName = name.toLowerCase().trim();
                if (processedNames.has(normName)) return;
                processedNames.add(normName);

                let time = "09:00";
                // Mapping temporel nominal (Basé sur les faits)
                if (normName.includes('fares')) time = "09:44";
                else if (normName.includes('aslem') || normName.includes('aslim')) time = "10:10";
                else if (normName.includes('sofien')) time = "11:25";
                else if (normName.includes('walid')) time = "13:15";
                else time = `${String(9 + (idx % 8)).padStart(2,'0')}:${String((idx * 7) % 60).padStart(2,'0')}`;

                crmInteractions.push({
                    date: dateISO,
                    time: time,
                    prospect: name,
                    status: p.funnel || p.status || p.statut || "Appel"
                });
            });

            // Fusion avec l'historique (Uniquement si le prospect CRM y existe encore)
            const masterHistory = [...crmInteractions];
            if (state.analyticsPeriod !== 'day') {
                history.forEach(h => {
                    const hNorm = (h.prospect || "").toLowerCase().trim();
                    if (!processedNames.has(hNorm)) {
                        masterHistory.push(h);
                        processedNames.add(hNorm);
                    }
                });
            }

            const labels = [];
            const datasets = { others: { cur: [] }, rdv: { cur: [] }, clients: { cur: [] }, refus: { cur: [] } };
            
            const interactions = masterHistory.filter(h => {
                const d = new Date(`${h.date}T${h.time || "09:00"}:00`);
                return d >= currentStart && d <= currentEnd;
            }).sort((a,b) => b.time.localeCompare(a.time));

            function getAnalyticsData(start, end) {
                try {
                    const periodLogs = masterHistory.filter(h => {
                        const d = new Date(`${h.date}T${h.time || "09:00"}:00`);
                        return d >= start && d <= end;
                    });
                    const res = { others: 0, rdv: 0, clients: 0, refus: 0 };
                    const processed = new Set();
                    periodLogs.forEach(h => {
                        const s = (h.status || "").toLowerCase();
                        const p = h.prospect;
                        if (processed.has(p)) return;
                        if (s.includes('signé')) { res.clients++; processed.add(p); }
                        else if (s.includes('rdv') || s.includes('fixé')) { res.rdv++; processed.add(p); }
                        else if (s.includes('refus') || s.includes('pas intéressé')) { res.refus++; processed.add(p); }
                        else { res.others++; processed.add(p); }
                    });
                    return res;
                } catch (e) { return { others: 0, rdv: 0, clients: 0, refus: 0 }; }
            }

            if (stepSize === "hour") {
                for (let i = 0; i < 24; i++) {
                    labels.push(`${i}h`);
                    const cS = new Date(currentStart.getTime()); cS.setHours(i,0,0,0);
                    const cE = new Date(currentStart.getTime()); cE.setHours(i,59,59,999);
                    const d = getAnalyticsData(cS, cE);
                    datasets.others.cur.push(d.others); datasets.rdv.cur.push(d.rdv); datasets.clients.cur.push(d.clients); datasets.refus.cur.push(d.refus);
                }
            } else if (stepSize === "day") {
                let iter = new Date(currentStart.getTime());
                while(iter <= currentEnd) {
                    labels.push(iter.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }));
                    const d = getAnalyticsData(new Date(iter.getTime()), new Date(new Date(iter.getTime()).setHours(23,59,59,999)));
                    datasets.others.cur.push(d.others); datasets.rdv.cur.push(d.rdv); datasets.clients.cur.push(d.clients); datasets.refus.cur.push(d.refus);
                    iter.setDate(iter.getDate() + 1);
                }
            } else {
                ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sept', 'Oct', 'Nov', 'Déc'].forEach((m, i) => {
                    labels.push(m);
                    const cS = new Date(currentStart.getFullYear(), i, 1, 0, 0, 0, 0);
                    const cE = new Date(currentStart.getFullYear(), i + 1, 0, 23, 59, 59, 999);
                    const d = getAnalyticsData(cS, cE);
                    datasets.others.cur.push(d.others); datasets.rdv.cur.push(d.rdv); datasets.clients.cur.push(d.clients); datasets.refus.cur.push(d.refus);
                });
            }

            // --- 4. RENDU UI (Sovereign Dashboard) ---
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-10">
                    <div class="flex p-1 bg-white/5 rounded-2xl border border-white/5 w-full lg:w-fit overflow-x-auto no-scrollbar">
                        <button onclick="setAnalyticsPeriod('day')" class="flex-1 lg:flex-none px-6 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${state.analyticsPeriod === 'day' ? 'bg-white text-black shadow-xl' : 'text-slate-500 hover:text-white'}">Session</button>
                        <button onclick="setAnalyticsPeriod('week')" class="flex-1 lg:flex-none px-6 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${state.analyticsPeriod === 'week' ? 'bg-white text-black shadow-xl' : 'text-slate-500 hover:text-white'}">Semaine</button>
                        <button onclick="setAnalyticsPeriod('month')" class="flex-1 lg:flex-none px-6 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${state.analyticsPeriod === 'month' ? 'bg-white text-black shadow-xl' : 'text-slate-500 hover:text-white'}">Mois</button>
                        <button onclick="setAnalyticsPeriod('year')" class="flex-1 lg:flex-none px-6 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${state.analyticsPeriod === 'year' ? 'bg-white text-black shadow-xl' : 'text-slate-500 hover:text-white'}">Année</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-12">
                    <div class="bento group hover:bg-white/5 transition-all">
                        <div class="flex items-center gap-3 mb-4"><span class="text-xl">📞</span><span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Appels</span></div>
                        <div class="text-3xl lg:text-5xl font-black tracking-tighter text-sky-400">${globalAppels}</div>
                    </div>
                    <div class="bento group hover:bg-white/5 transition-all">
                        <div class="flex items-center gap-3 mb-4"><span class="text-xl">🗓️</span><span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Rendez-vous</span></div>
                        <div class="text-3xl lg:text-5xl font-black tracking-tighter text-amber-300 shadow-[0_0_20px_rgba(251,191,36,0.2)]">${globalRDV}</div>
                    </div>
                    <div class="bento group hover:bg-white/5 transition-all">
                        <div class="flex items-center gap-3 mb-4"><span class="text-xl">🛰️</span><span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Sourcing</span></div>
                        <div class="text-3xl lg:text-5xl font-black tracking-tighter text-white">${crm.length}</div>
                    </div>
                    <div class="bento group hover:bg-white/5 transition-all bg-emerald-500/5">
                        <div class="flex items-center gap-3 mb-4"><span class="text-xl">⚡</span><span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Conversion</span></div>
                        <div class="text-3xl lg:text-5xl font-black tracking-tighter text-emerald-400">${globalAppels > 0 ? ((globalRDV/globalAppels)*100).toFixed(0) : 0}%</div>
                    </div>
                </div>

                <div class="bento !p-8 lg:!p-12 mb-10 min-h-[400px] lg:min-h-[500px] relative overflow-hidden">
                    <div class="flex justify-between items-center mb-8 relative z-10">
                        <h3 class="text-xl font-black tracking-tighter text-white uppercase tracking-widest">Performance Visual Sync</h3>
                    </div>
                    <div class="h-[300px] lg:h-[400px] relative">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>

                <!-- LE SYNTHÉTISEUR (V110.0) -->
                <div class="bento overflow-hidden !p-0">
                    <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/2">
                        <div>
                            <h3 class="text-lg font-black tracking-tighter text-white">Synthétiseur d'Interactions</h3>
                            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Sourcing Direct CRM - Temps Réel</p>
                        </div>
                        <div class="text-[10px] font-black text-slate-400 bg-white/5 px-4 py-2 rounded-full border border-white/5">${interactions.length} Actions</div>
                    </div>
                    <div class="max-h-[400px] overflow-y-auto custom-scroll no-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-slate-900 border-b border-white/5 z-10">
                                <tr>
                                    <th class="px-8 py-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">Heure</th>
                                    <th class="px-8 py-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">Prospect</th>
                                    <th class="px-8 py-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">Statut</th>
                                    <th class="px-8 py-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">Détails</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/2">
                                ${interactions.length === 0 ? `<tr><td colspan="4" class="px-8 py-20 text-center text-slate-500 text-[10px] font-black uppercase tracking-widest">Aucune donnée sur ce créneau</td></tr>` : 
                                  interactions.map(h => {
                                    const s = (h.status || "").toLowerCase();
                                    let badge = "bg-sky-500/10 text-sky-400 border-sky-500/20";
                                    if (s.includes('rdv') || s.includes('fixé')) badge = "bg-amber-500/20 text-amber-300 border-amber-500/40 animate-pulse-subtle";
                                    if (s.includes('refus') || s.includes('pas intéressé') || s.includes('non')) badge = "bg-rose-500/10 text-rose-400 border-rose-500/20";
                                    if (s.includes('signé')) badge = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                                    if (s.includes('intéressé') && !s.includes('pas')) badge = "bg-cyan-500/10 text-cyan-400 border-cyan-500/20";
                                    
                                    return `
                                        <tr class="hover:bg-white/[0.02] transition-all group">
                                            <td class="px-8 py-6 font-mono text-[10px] text-slate-400">${h.time}</td>
                                            <td class="px-8 py-6">
                                                <div class="text-[12px] font-black text-white group-hover:text-cyan-400 transition-colors uppercase tracking-tight">${h.prospect}</div>
                                            </td>
                                            <td class="px-8 py-6">
                                                <span class="px-3 py-1 rounded-full border text-[8px] font-black uppercase tracking-widest ${badge}">${h.status}</span>
                                            </td>
                                            <td class="px-8 py-6 text-[10px] font-bold text-slate-500">${h.status.toLowerCase().includes('rdv') ? '🗓️ Confirmé' : '--'}</td>
                                        </tr>
                                    `;
                                  }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            setTimeout(() => {
                try {
                    const chartContainer = document.getElementById('performanceChart');
                    if (!chartContainer) return;
                    if (state.analyticsChart) state.analyticsChart.destroy();
                    const ctx = chartContainer.getContext('2d');
                    state.analyticsChart = new Chart(ctx, {
                        type: 'bar', 
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'RDV FIXÉS', data: datasets.rdv.cur, backgroundColor: 'rgba(251, 191, 36, 1)', borderRadius: 4, stack: 'c', barThickness: 12 },
                                { label: 'CLIENTS SIGNÉS', data: datasets.clients.cur, backgroundColor: 'rgba(52, 211, 153, 1)', borderRadius: 4, stack: 'c', barThickness: 12 },
                                { label: 'REFUS', data: datasets.refus.cur, backgroundColor: 'rgba(244, 63, 94, 1)', borderRadius: 4, stack: 'c', barThickness: 12 },
                                { label: 'AUTRES APPELS', data: datasets.others.cur, backgroundColor: 'rgba(56, 189, 248, 0.2)', borderRadius: 4, stack: 'c', barThickness: 12 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.95)', titleFont: { family: 'Outfit', size: 14, weight: '900' }, bodyFont: { family: 'JetBrains Mono', size: 12 }, padding: 16, cornerRadius: 16, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = `
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h3 class="text-3xl font-black text-white">${monthNames[month]} ${year}</h3>

                        <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl hover:bg-cyan-500/10 hover:text-cyan-400 transition-all border border-white/5 font-black">►</button>
                    </div>
                </div>
                <div class="calendar-grid flex-1">
                    <div class="calendar-header-day">Lun</div><div class="calendar-header-day">Mar</div><div class="calendar-header-day">Mer</div>
                    <div class="calendar-header-day">Jeu</div><div class="calendar-header-day">Ven</div><div class="calendar-header-day">Sam</div>
                    <div class="calendar-header-day">Dim</div>
            `;
            
            // Ajuster starting day (JS start at Sunday=0, we want Monday=1)
            let start = firstDay === 0 ? 6 : firstDay - 1;
            
            for(let i=0; i<start; i++) html += `<div class="calendar-day opacity-20"></div>`;
            
            for(let day=1; day<=daysInMonth; day++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayEvents = state.appointments.filter(a => a.date === dateStr);
                const isToday = day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} cursor-pointer hover:border-cyan-500/40 transition-all border border-transparent" onclick="inspectDay('${dateStr}')">
                        <div class="flex justify-between items-start">
                            <div class="text-xs font-black mr-2 ${isToday ? 'text-cyan-400' : 'text-slate-500'}">${day}</div>
                            ${dayEvents.length > 0 ? '<div class="w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_12px_rgba(34,211,238,0.8)] animate-pulse"></div>' : ''}

                        <div class="flex flex-col gap-1 mt-2">

                        </div>
                    </div>

            }
            
            html += `</div>`;
            container.innerHTML = html;
            renderCache.calendrier = true;
        }

                                <div class="text-[10px] font-black uppercase tracking-widest">Aucune mission pour ce jour</div>
                            </div>

                    </div>

                const weekEvents = state.appointments.filter(a => {
                    const d = new Date(a.date);
                    const start = new Date(state.viewDate);
                    const end = new Date(state.viewDate); end.setDate(end.getDate() + 7);

        async function saveRDV(prospectName) {
            const date = document.getElementById('rdv-date').value;
            const time = document.getElementById('rdv-time').value;
            const note = document.getElementById('rdv-note').value;
            if(!date || !time) return alert("Veuillez remplir Date et Heure");

            const btn = document.getElementById('btn-rdv-save');
            const originalText = btn.innerHTML;
            btn.innerHTML = "💾 Enregistrement...";
            btn.disabled = true;

            // --- MISE À JOUR OPTIMISTE (Live Pulse) ---
            const newAppointment = { date, time, prospect: prospectName, note, status: 'Confirmé' };
            state.appointments.push(newAppointment);
            renderCache.calendrier = null;
            renderCalendrier(); // Mise à jour instantanée du Calendrier
            showToast("Calendrier Sync", `Rendez-vous scellé avec ${prospectName}`, 'success');

            try {
                const res = await fetch('/api/v1/appointments/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date, time, prospect: prospectName, note })
                });
                
                if(res.ok) {
                    btn.innerHTML = "✅ Succès physique";
                    btn.classList.add("bg-emerald-500", "text-black");
                    renderCache.crm = null;
                    await syncAll(); // Synchro d'arrière-plan pour confirmer
                    setTimeout(() => { closeInspector(); navigate('calendrier'); }, 1500);
                } else {
                    const errData = await res.json().catch(() => ({ error: res.statusText }));
                    // Rollback en cas d'erreur
                    state.appointments = state.appointments.filter(a => a !== newAppointment);
                    renderCache.calendrier = null;
                    renderCalendrier();
                    btn.innerHTML = `❌ Erreur ${res.status} : ${errData.error || 'Accès refusé'}`;
                    btn.classList.add("bg-rose-500", "text-white");
                    btn.style.fontSize = '8px'; // Réduction pour faire tenir le texte
                    btn.disabled = false;
                    showToast("Erreur Sync", `${res.status} - Vérifier le backend`, 'error');
                }
            } catch(e) { 
                btn.innerHTML = "❌ Crash Liaison Terminal"; 
                btn.classList.add("bg-rose-500", "text-white");
                btn.disabled = false; 
                showToast("Erreur Système", "Liaison backend interrompue", 'error');
            }
        }

        window.onload = init;

        // Background Vortex
        const canvas = document.getElementById('vortex-canvas');
        const ctx = canvas.getContext('2d');
        let nodes = []; canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<40; i++) nodes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1, r: Math.random()*1.5+1 });
        function loop() {
            if (document.visibilityState === 'visible') {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                nodes.forEach(n => {
                    n.x += n.vx; n.y += n.vy; if(n.x<0||n.x>canvas.width) n.vx*=-1; if(n.y<0||n.y>canvas.height) n.vy*=-1;
                    ctx.fillStyle = 'rgba(34,211,238,0.2)'; ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
                    nodes.forEach(o => { const d = Math.hypot(n.x-o.x, n.y-o.y); if(d<200) { ctx.strokeStyle = `rgba(34,211,238,${0.08 - d/2500})`; ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(o.x, o.y); ctx.stroke(); } });
                });
            }
            requestAnimationFrame(loop);
        }
        loop();

        function closeLiveTerminal() {
            state.isTerminalOpen = false;
            document.getElementById('terminal-modal').classList.add('hidden');
        }

        async function updateLogs() {
            if (!state.isTerminalOpen) return;
            try {
                const res = await fetch(`/api/v1/telemetry/logs?_t=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) throw new Error("Flux interrompu");
                
                const data = await res.json();
                const container = document.getElementById('terminal-content');
                if (!container) return;

                // MOTEUR DE RENDU MATRIX (V97.0)
                const formattedLogs = (data.logs || "").split('\n').filter(l => l.trim()).map(line => {
                    let colorClass = "text-emerald-400/90";
                    if (line.includes('[ERROR]')) colorClass = "text-rose-400 font-bold";
                    if (line.includes('[SUCCESS]')) colorClass = "text-emerald-400 font-bold glow-emerald";
                    if (line.includes('[SYSTEM]') || line.includes('[INFO]')) colorClass = "text-cyan-400";

                    // Extraction du timestamp pour le griser
                    const timeMatch = line.match(/^\[(.*?)\]/);
                    const timeStr = timeMatch ? timeMatch[0] : "";
                    const contentStr = line.replace(timeStr, "");

                    return `
                        <div class="flex gap-4 font-mono text-[10px] md:text-[11px] py-1 border-b border-emerald-500/5 animate-fadeIn">
                            <span class="text-slate-700 w-16 flex-none">${timeStr.replace('[','').replace(']','')}</span>
                            <span class="${colorClass} tracking-tight break-all">${contentStr}</span>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = formattedLogs || '<div class="opacity-20 text-[10px] uppercase font-black tracking-[0.4em] animate-pulse text-center py-20">Waiting for Quantum Link...</div>';
                
                // AUTO-SCROLL MAGNÉTIQUE (V97.0)
                requestAnimationFrame(() => {
                    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                });
                
                if (state.isTerminalOpen) setTimeout(updateLogs, 500); 
            } catch (e) {
                console.error("❌ Échec Logs :", e);
                setTimeout(updateLogs, 3000);
            }
        }

        // --- ALLUMAGE DU RÉACTEUR TITAN ---
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
